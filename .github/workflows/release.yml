name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Релизная версия, пример: v0.4.0"
        required: true
      source_image_tag:
        description: "Релизный Docker-тег: abc123"
        required: true
      changelog:
        description: "Описание изменений"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag Docker image
        run: |
          docker pull melkor73/goals-service:${{ github.event.inputs.source_image_tag }}
          docker tag melkor73/goals-service:${{ github.event.inputs.source_image_tag }} melkor73/goals-service:${{ github.event.inputs.version }}
          docker push melkor73/goals-service:${{ github.event.inputs.version }}

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ github.event.inputs.version }}" -m "${{ github.event.inputs.changelog }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.changelog }}
