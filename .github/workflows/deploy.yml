name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            cd apps/goals-app
            docker compose pull goals-service
            docker compose run --rm goals-service-migrations npx node-pg-migrate --config node-pg-migrate.config.mjs up
            docker compose up -d --no-deps goals-service
            docker compose restart goals-nginx
            docker compose ps
